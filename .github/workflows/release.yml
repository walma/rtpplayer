name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag

  warm_jitpack:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Trigger JitPack build for release tag
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MODULES=("rtp-player" "rtp-player-ui")
          for module in "${MODULES[@]}"; do
            POM_URL="https://jitpack.io/com/github/${REPOSITORY_OWNER}/${REPOSITORY_NAME}/${module}/${TAG}/${module}-${TAG}.pom"
            published=false
            for attempt in $(seq 1 20); do
              if curl --fail --silent --show-error --location "$POM_URL" > "/tmp/${module}.pom"; then
                published=true
                break
              fi
              sleep 30
            done
            if [ "$published" != true ]; then
              echo "JitPack did not publish module ${module} for tag ${TAG} in time" >&2
              exit 1
            fi
          done
